<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle with gradient -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#B8956E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6F47;stop-opacity:1" />
    </radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@400;500;600&display=swap');
      .title-text { font-family: 'Playfair Display', serif; font-weight: 500; letter-spacing: 4px; }
      .subtitle-text { font-family: 'Poppins', sans-serif; font-weight: 300; letter-spacing: 2px; }
    </style>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGradient)" stroke="#A68A6F" stroke-width="1.5"/>
  
  <!-- Inner decorative circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#D4C5B9" stroke-width="1" opacity="0.6"/>
  
  <!-- Top decorative line -->
  <line x1="60" y1="45" x2="140" y2="45" stroke="#E8D5C4" stroke-width="0.8" opacity="0.8"/>
  
  <!-- Main title -->
  <text x="100" y="82" class="title-text" font-size="32" text-anchor="middle" fill="#F5EFE7">
    COLOR
  </text>
  
  <!-- Subtitle -->
  <text x="100" y="110" class="title-text" font-size="28" text-anchor="middle" fill="#F5EFE7">
    STUDIO
  </text>
  
  <!-- Decorative elements -->
  <circle cx="95" cy="125" r="1.5" fill="#E8D5C4"/>
  <circle cx="100" cy="125" r="1.5" fill="#E8D5C4"/>
  <circle cx="105" cy="125" r="1.5" fill="#E8D5C4"/>
  
  <!-- Artist name -->
  <text x="100" y="148" class="subtitle-text" font-size="10" text-anchor="middle" fill="#D4C5B9">
    G U S T A V O   G Ó M E Z
  </text>
  
  <!-- Bottom decorative line -->
  <line x1="60" y1="155" x2="140" y2="155" stroke="#E8D5C4" stroke-width="0.8" opacity="0.8"/>
</svg>